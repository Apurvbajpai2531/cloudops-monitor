apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: cloudops
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: cloudops-frontend:latest
          imagePullPolicy: Never
          env:
            - name: API_URL
              value: http://backend:8000
          ports:
            - containerPort: 8501
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: cloudops
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 8501
      targetPort: 8501
      nodePort: 30085
